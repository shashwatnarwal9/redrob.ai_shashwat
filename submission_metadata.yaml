# ----------------------------------------------------------------------------
# AI tools declaration (transparency only; not penalized)
# ----------------------------------------------------------------------------
ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Claude was used for architectural discussion, code review, and drafting the
  rule/keyword knowledge base from the job description. All design decisions
  (coherence gate, honeypot consistency checks, behavioral modifier, weights)
  were directed and verified by the team. No candidate data is sent to any LLM,
  and the ranking step makes no network calls of any kind.

# ----------------------------------------------------------------------------
# Approach summary (<=200 words)
# ----------------------------------------------------------------------------
methodology_summary: |
  A coherence-gated, rule-based fit ranker — no LLM or embedding calls at
  ranking time (CPU-only, no network, stdlib-only, ~105s for 100K).

  Per candidate we build three separate text views: identity (headline+title+
  summary, what they CLAIM), evidence (career-history descriptions, what they
  DID), and skills (most easily gamed). A coherence gate detects whether the
  person is actually an engineer or a non-tech professional who stuffed AI
  keywords into their skills list — the dataset's central trap — and multiplies
  down the latter. Technical fit is a weighted blend of the JD's "absolutely
  need" signals (retrieval/ranking/search, embeddings, vector DBs, evaluation
  frameworks), product-vs-services exposure, applied-ML tenure (years in ML
  roles, not just total), a skill-trust score that weights relevant skills by
  endorsements + months + Redrob assessment, the 5-9y band, and location.
  Explicit penalties cover the JD's "do NOT want" list: CV/speech-only,
  consulting-only careers, recent-GenAI-without-ML-depth, job-hopping,
  management/architecture titles without recent hands-on code, and outside
  India. A behavioral multiplier down-weights dormant / low-response profiles.
  Internally-inconsistent profiles (skill used longer than the career; expert
  with 0 months; role outlasting the career) are flagged as honeypots and
  floored. Matching uses word-boundary regex to avoid substring false positives.

